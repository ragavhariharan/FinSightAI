<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" fill="none" role="img" aria-label="FinSight architecture">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1C1C1C"/>
      <stop offset="1" stop-color="#141414"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#737373"/>
    </marker>
  </defs>

  <rect width="960" height="420" rx="16" fill="#0E0E0E"/>
  <text x="40" y="42" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#F5F5F5">System architecture</text>

  <!-- React -->
  <rect x="40" y="72" width="200" height="88" rx="12" fill="url(#panel)" stroke="#404040"/>
  <text x="140" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#F5F5F5">React + Vite</text>
  <text x="140" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#A3A3A3">Dashboard À Kash À Views</text>

  <!-- Supabase -->
  <rect x="380" y="72" width="200" height="88" rx="12" fill="url(#panel)" stroke="#404040"/>
  <text x="480" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#F5F5F5">Supabase</text>
  <text x="480" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#A3A3A3">Auth À Postgres À RLS</text>

  <!-- Edge -->
  <rect x="720" y="72" width="200" height="88" rx="12" fill="url(#panel)" stroke="#404040"/>
  <text x="820" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#F5F5F5">Edge Functions</text>
  <text x="820" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#A3A3A3">AI À Market À News</text>

  <line x1="240" y1="116" x2="380" y2="116" stroke="#737373" marker-end="url(#arrow)"/>
  <line x1="580" y1="116" x2="720" y2="116" stroke="#737373" marker-end="url(#arrow)"/>

  <!-- DB box -->
  <rect x="300" y="220" width="360" height="150" rx="14" fill="#181818" stroke="#333333"/>
  <text x="480" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#F5F5F5">PostgreSQL</text>

  <rect x="330" y="270" width="140" height="36" rx="8" fill="#262626" stroke="#404040"/>
  <text x="400" y="293" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#A3A3A3">transactions</text>

  <rect x="490" y="270" width="140" height="36" rx="8" fill="#262626" stroke="#404040"/>
  <text x="560" y="293" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#A3A3A3">budgets</text>

  <rect x="330" y="318" width="300" height="36" rx="8" fill="#1A2F24" stroke="#3A6B50"/>
  <text x="480" y="341" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#62D492">recompute_dashboard_snapshot()</text>

  <line x1="480" y1="160" x2="480" y2="220" stroke="#737373" marker-end="url(#arrow)"/>

  <!-- External -->
  <rect x="40" y="250" width="180" height="72" rx="12" fill="#1A120E" stroke="#F05A22" stroke-opacity="0.5"/>
  <text x="130" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#FF7A45">OpenRouter</text>
  <text x="130" y="302" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#A3A3A3">Kash À Onboarding</text>

  <rect x="740" y="250" width="180" height="72" rx="12" fill="#152A32" stroke="#1292B4" stroke-opacity="0.5"/>
  <text x="830" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1292B4">Market + News</text>
  <text x="830" y="302" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#A3A3A3">Yahoo À AMFI À RSS</text>

  <line x1="220" y1="286" x2="720" y2="130" stroke="#737373" stroke-dasharray="5 5"/>
  <line x1="740" y1="286" x2="820" y2="160" stroke="#737373" stroke-dasharray="5 5"/>
</svg>
